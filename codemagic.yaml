workflows:
  ios-release:
    name: iOS Release to TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 120
    environment:
      groups:
        - a
      vars:
        APP_ID: com.muasi.driversapp
        APP_NAME: muasidivoapp
        XCODE_WORKSPACE: ios/Runner.xcworkspace
        XCODE_SCHEME: Runner
      flutter: stable
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
      cancel_previous_builds: true
    scripts:
      - name: Flutter clean
        script: |
          set -euo pipefail
          echo "Cleaning Flutter build..."
          flutter clean

      - name: Flutter pub get
        script: |
          set -euo pipefail
          echo "Getting Flutter dependencies..."
          flutter pub get

      - name: Install iOS pods
        script: |
          set -euo pipefail
          echo "Installing iOS pods..."
          cd ios
          rm -rf Pods Podfile.lock
          pod install --repo-update
          cd ..

      - name: Check App Store Connect credentials
        script: |
          set -euo pipefail
          echo "=========================================="
          echo "Checking App Store Connect credentials..."
          echo "=========================================="
          echo "Key ID: ${APP_STORE_CONNECT_KEY_IDENTIFIER:-NOT SET}"
          echo "Issuer ID: ${APP_STORE_CONNECT_ISSUER_ID:-NOT SET}"
          echo "Private key: ${APP_STORE_CONNECT_PRIVATE_KEY:+SET}${APP_STORE_CONNECT_PRIVATE_KEY:-NOT SET}"

          if [ -n "${APP_STORE_CONNECT_PRIVATE_KEY:-}" ] && [ -f "$APP_STORE_CONNECT_PRIVATE_KEY" ]; then
            echo "Private key is a file at: $APP_STORE_CONNECT_PRIVATE_KEY"
            echo "File exists: yes"
            echo "File size: $(wc -c < "$APP_STORE_CONNECT_PRIVATE_KEY") bytes"
          fi

          echo ""
          echo "Testing connection to App Store Connect..."
          RESPONSE=$(app-store-connect bundle-ids list --json 2>&1) || {
            echo "❌ Command failed"
            echo "$RESPONSE"
            exit 1
          }
          echo "✅ Command exited with code 0"
          echo "Response length: $(echo "$RESPONSE" | wc -c) chars"
          echo "Response preview (first 200 chars):"
          echo "$RESPONSE" | head -c 200
          echo ""

      - name: Set up code signing
        script: |
          set -euo pipefail
          
          if [ -z "${APP_ID:-}" ]; then
              echo "❌ APP_ID environment variable is not set"
              exit 1
          fi
          
          echo "=========================================="
          echo "Step 1: Getting Bundle ID"
          echo "=========================================="
          
          BUNDLE_ID=$(APP_ID="$APP_ID" python3 << 'PYEOF'
          import json, os, subprocess, sys

          app_id = os.environ.get("APP_ID", "")
          result = subprocess.run(
              ["app-store-connect", "bundle-ids", "list", "--json"],
              capture_output=True, text=True
          )
          output = result.stdout

          # Skip human-readable prefix (e.g. "Found X Bundle IDs...")
          import re
          match = re.search(r'[\{\[]', output)
          if not match:
              print("ERROR: No JSON found in output", file=sys.stderr)
              print(output[:500], file=sys.stderr)
              sys.exit(1)

          try:
              data = json.loads(output[match.start():])
              matching = [b['id'] for b in data if b.get('attributes', {}).get('identifier') == app_id]
              if matching:
                  print(matching[0])
              else:
                  print("ERROR: No matching bundle ID found for " + app_id, file=sys.stderr)
                  sys.exit(1)
          except Exception as e:
              print(f"ERROR: {e}", file=sys.stderr)
              sys.exit(1)
          PYEOF
          )
          
          if [[ "$BUNDLE_ID" == "ERROR:"* ]] || [ -z "$BUNDLE_ID" ]; then
              echo "❌ Failed to resolve Bundle ID for $APP_ID"
              exit 1
          fi
          
          echo "✅ Bundle ID: $BUNDLE_ID"
          
          echo ""
          echo "=========================================="
          echo "Step 2: Managing Distribution Certificates"
          echo "=========================================="
          
          CERTS_RAW=$(app-store-connect certificates list --type DISTRIBUTION --json 2>&1) || {
              echo "❌ Error fetching certificates"
              echo "$CERTS_RAW"
              exit 1
          }
          CERTS_JSON=$(echo "$CERTS_RAW" | sed -n '/^[\[{]/,$ p')
          
          CERT_COUNT=$(echo "$CERTS_JSON" | python3 << 'EOF'
          import json, sys
          try:
              data = json.load(sys.stdin)
              print(len(data.get('data', [])))
          except Exception:
              print("0")
          EOF
          )
          
          if [ "$CERT_COUNT" -gt 0 ]; then
              CERT_ID=$(echo "$CERTS_JSON" | python3 << 'EOF'
              import json, sys
              try:
                  data = json.load(sys.stdin)
                  if data.get('data'):
                      print(data['data'][0].get('id', ''))
              except Exception:
                  print("")
              EOF
              )
              
              if [ -z "$CERT_ID" ]; then
                  echo "❌ Could not extract certificate ID"
                  exit 1
              fi
              
              echo "✅ Found $CERT_COUNT existing certificate(s)"
              echo "✅ Using Certificate ID: $CERT_ID"
          else
              echo "⚠️  No existing certificates found. Creating new one..."
              
              CERT_DIR=$(mktemp -d)
              trap 'rm -rf "$CERT_DIR"' EXIT
              
              openssl genrsa -out "$CERT_DIR/key.pem" 2048 2>/dev/null
              
              CREATE_RESPONSE=$(app-store-connect certificates create \
                --type DISTRIBUTION \
                --certificate-key "@file:$CERT_DIR/key.pem" \
                --save 2>&1) || {
                  echo "❌ Error creating certificate"
                  echo "$CREATE_RESPONSE"
                  exit 1
              }
              
              echo "✅ Certificate created successfully"
              
              CERTS_RAW=$(app-store-connect certificates list --type DISTRIBUTION --json)
              CERTS_JSON=$(echo "$CERTS_RAW" | sed -n '/^[\[{]/,$ p')
              CERT_ID=$(echo "$CERTS_JSON" | python3 << 'EOF'
              import json, sys
              try:
                  data = json.load(sys.stdin)
                  if data.get('data'):
                      print(data['data'][0].get('id', ''))
              except Exception:
                  print("")
              EOF
              )
              
              if [ -z "$CERT_ID" ]; then
                  echo "❌ Could not retrieve new certificate ID"
                  exit 1
              fi
              
              echo "✅ New Certificate ID: $CERT_ID"
          fi
          
          echo ""
          echo "=========================================="
          echo "Step 3: Managing Provisioning Profile"
          echo "=========================================="
          
          PROFILE_NAME="iOS App Store ${APP_ID}"
          
          PROFILES_RAW=$(app-store-connect profiles list --type IOS_APP_STORE --json 2>&1) || {
              echo "❌ Error fetching profiles"
              echo "$PROFILES_RAW"
              exit 1
          }
          PROFILES_JSON=$(echo "$PROFILES_RAW" | sed -n '/^[\[{]/,$ p')
          
          EXISTING_PROFILE=$(echo "$PROFILES_JSON" | APP_ID="$APP_ID" python3 << 'EOF'
          import json, sys, os
          try:
              data = json.load(sys.stdin)
              app_id = os.environ.get("APP_ID", "")
              matching = [p for p in data.get('data', []) 
                         if app_id in p.get('attributes', {}).get('name', '')]
              if matching:
                  print(matching[0].get('id', ''))
              else:
                  print("")
          except Exception:
              print("")
          EOF
          )
          
          if [ -z "$EXISTING_PROFILE" ]; then
              echo "⚠️  No existing profile found. Creating new one..."
              
              CREATE_PROFILE=$(app-store-connect profiles create \
                "$BUNDLE_ID" \
                --certificate-ids "$CERT_ID" \
                --type IOS_APP_STORE \
                --name "$PROFILE_NAME" \
                --save 2>&1) || {
                  echo "❌ Error creating profile"
                  echo "$CREATE_PROFILE"
                  exit 1
              }
              
              echo "✅ Profile created successfully"
          else
              echo "✅ Found existing profile: $EXISTING_PROFILE"
              
              if ! DOWNLOAD=$(app-store-connect profiles download "$EXISTING_PROFILE" --save 2>&1); then
                  echo "⚠️  Could not download profile, will attempt to recreate..."
                  app-store-connect profiles create \
                    "$BUNDLE_ID" \
                    --certificate-ids "$CERT_ID" \
                    --type IOS_APP_STORE \
                    --name "$PROFILE_NAME" \
                    --save || {
                        echo "❌ Error recreating profile"
                        exit 1
                    }
              else
                  echo "✅ Profile downloaded successfully"
              fi
          fi
          
          echo ""
          echo "=========================================="
          echo "Step 4: Setting up Keychain"
          echo "=========================================="
          
          keychain initialize
          echo "✅ Keychain initialized"
          
          P12_DIR="/Users/builder/Library/Developer/Xcode/UserData/Certificates"
          shopt -s nullglob
          P12_FILES=("$P12_DIR"/*.p12)
          shopt -u nullglob
          
          if [ ${#P12_FILES[@]} -eq 0 ]; then
              echo "⚠️  No .p12 files found in $P12_DIR"
          else
              if CERT_IMPORT=$(security import \
                "$P12_DIR"/*.p12 \
                -k ~/Library/Keychains/login.keychain-db \
                -P "" \
                2>&1); then
                  echo "✅ Certificates imported/verified"
              elif [[ "$CERT_IMPORT" == *"already exists"* ]]; then
                  echo "✅ Certificates already imported"
              else
                  echo "⚠️  Certificate import status: $CERT_IMPORT"
              fi
          fi
          
          echo ""
          echo "=========================================="
          echo "Step 5: Applying Xcode Settings"
          echo "=========================================="
          
          xcode-project use-profiles
          echo "✅ Xcode profiles applied"
          
          echo ""
          echo "=========================================="
          echo "✅ Code signing setup complete!"
          echo "=========================================="

      - name: Build iOS Release IPA
        script: |
          set -euo pipefail
          
          echo "=========================================="
          echo "Determining build number..."
          echo "=========================================="
          
          if ! BUILD_NUMBER_RESPONSE=$(app-store-connect get-latest-testflight-build-number \
            --app-id "${APP_ID}" 2>&1); then
              BUILD_NUMBER=1
              echo "⚠️  Could not fetch latest build number, starting with 1"
          else
              LATEST_BUILD=$(echo "$BUILD_NUMBER_RESPONSE" | tail -1 | tr -d '[:space:]')
              if [[ "$LATEST_BUILD" =~ ^[0-9]+$ ]]; then
                  BUILD_NUMBER=$((LATEST_BUILD + 1))
                  echo "✅ Latest TestFlight build: $LATEST_BUILD"
              else
                  BUILD_NUMBER=1
                  echo "⚠️  Could not parse build number, starting with 1"
              fi
          fi
          
          echo "🔨 Building with number: $BUILD_NUMBER"
          echo ""
          
          flutter build ipa \
            --release \
            --build-number=$BUILD_NUMBER \
            --verbose

    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/archive/Runner.xcarchive/**/*.dSYM.zip

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false
      email:
        recipients:
          - developer@example.com
        notify:
          success: true
          failure: true
      slack:
        channel: '#builds'
        notify_on_build_start: true
        notify:
          success: true
          failure: true