workflows:
  ios-release:
    name: iOS Release to TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      groups:
        - a
      vars:
        APP_ID: com.muasi.Drivers-app
        APP_NAME: muasidivoapp
        XCODE_WORKSPACE: ios/Runner.xcworkspace
        XCODE_SCHEME: Runner
      flutter: stable
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
      cancel_previous_builds: true
    scripts:
      - name: Flutter pub get
        script: flutter pub get
      - name: Flutter clean
        script: flutter clean
      - name: Install iOS pods
        script: |
          find . -name "Podfile" -execdir pod install \;
      - name: Set up code signing
        script: |
          set -e
          CERT_DIR=$(mktemp -d)
          openssl genrsa -out "$CERT_DIR/key.pem" 2048
          BUNDLE_ID=$(app-store-connect bundle-ids list \
            --identifier com.muasi.Drivers-app --json \
            | python3 -c "import json,sys; print(json.load(sys.stdin)['data'][0]['id'])")
          echo "Bundle ID resource: $BUNDLE_ID"
          app-store-connect certificates create \
            --type DISTRIBUTION \
            --certificate-key "@file:$CERT_DIR/key.pem" \
            --save
          CERT_ID=$(app-store-connect certificates list \
            --type DISTRIBUTION --json \
            | python3 -c "import json,sys; print(json.load(sys.stdin)['data'][0]['id'])")
          echo "Certificate ID: $CERT_ID"
          app-store-connect profiles create \
            "$BUNDLE_ID" \
            --certificate-ids "$CERT_ID" \
            --type IOS_APP_STORE \
            --name "iOS App Store com.muasi.Drivers-app" \
            --save
          keychain initialize
          security import \
            /Users/builder/Library/Developer/Xcode/UserData/Certificates/*.p12
          xcode-project use-profiles
      - name: Build iOS Release IPA
        script: |
          flutter build ipa --release \
            --build-number=$(($(app-store-connect get-latest-testflight-build-number --app-id "com.muasi.Drivers-app" 2>/dev/null || echo "0") + 1))
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - build/ios/archive/Runner.xcarchive/**/*.dSYM.zip
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false
      email:
        recipients:
          - developer@example.com
        notify:
          success: true
          failure: true
      slack:
        channel: '#builds'
        notify_on_build_start: true
        notify:
          success: true
          failure: true
