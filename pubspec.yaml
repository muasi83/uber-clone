name: chat_app
description: "A professional Uber clone with real-time ride matching, location tracking, and WebSocket support."
publish_to: 'none'

version: 1.0.1+5

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2

  # Networking & HTTP
  http: ^1.1.0
  web_socket_channel: ^3.0.3

  # Local Storage
  shared_preferences: ^2.5.5
  sqflite: ^2.3.0
  path: ^1.8.3
  path_provider: ^2.1.0

  # UI & Design
  pin_code_fields: ^8.0.1
  country_code_picker: ^3.4.1

  # Date & Time
  intl: ^0.19.0

  # Security
  flutter_secure_storage: ^9.2.0

  # Maps & Location
  google_maps_flutter: ^2.5.0
  geolocator: ^14.0.2
  geocoding: ^3.0.0
  audioplayers: ^6.7.0
  # ❌ REMOVED: google_maps_webservice - not needed!

  flutter_ringtone_player: ^4.0.0+1
  vibration: ^2.0.0

  # State Management
  provider: ^6.1.0

  # Caching
  cached_network_image: ^3.3.1

  # UI Components
  smooth_page_indicator: ^1.1.0
  flutter_local_notifications: ^20.1.0

  # URL Launching
  url_launcher: ^6.2.4

  # Background Service
  flutter_background_service: ^5.0.5

  # Firebase Cloud Messaging
  firebase_core: ^3.12.1
  firebase_messaging: ^15.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/map_style.json

flutter_launcher_icons:
  ios: true
  android: true
  image_path: "assets/images/app_icon.png"
  remove_alpha_ios: true